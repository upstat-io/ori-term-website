name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  repository_dispatch:
    types: [oriterm-roadmap-updated, oriterm-release-published]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout website
        uses: actions/checkout@v4

      - name: Checkout ori_term (roadmap data)
        uses: actions/checkout@v4
        with:
          repository: upstat-io/ori_term
          path: ori_term
          sparse-checkout: |
            plans/roadmap
          sparse-checkout-cone-mode: false

      - name: Symlink ori_term for relative path resolution
        run: ln -s "$GITHUB_WORKSPACE/ori_term" "$GITHUB_WORKSPACE/../ori_term"

      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
