name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  repository_dispatch:
    types: [oriterm-roadmap-updated, oriterm-release-published]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout website
        uses: actions/checkout@v4

      - name: Checkout ori_term (term_repo — git history for changelog)
        uses: actions/checkout@v4
        with:
          repository: upstat-io/ori-term
          path: ori_term
          fetch-depth: 500

      - name: Checkout wrapper for plans/ overlay
        uses: actions/checkout@v4
        with:
          repository: upstat-io/ori_term_ai
          path: ori_term_wrapper
          token: ${{ secrets.ORI_TERM_PAT }}

      - name: Overlay wrapper plans/ onto ori_term tree
        run: |
          rm -rf ori_term/plans
          mv ori_term_wrapper/plans ori_term/plans
          rm -rf ori_term_wrapper

      - name: Symlink ori_term for relative path resolution
        run: ln -s "$GITHUB_WORKSPACE/ori_term" "$GITHUB_WORKSPACE/../ori_term"

      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
